task:
  task_type: tuned
  n_tuned_units: 32
  tuning_kappa: 8.0
  pre_cue_steps: 25
  pre_cue_steps_choices: [15, 25, 35]
  cue_steps: 20
  cue_steps_choices: [10, 20, 30]
  delay_steps: 20
  delay_steps_choices: [10, 20, 40, 80]
  response_steps: 25
  batch_size: 64
  seed: 20260713
  fixation_gated: true

model:
  hidden_size: 64
  dt: 20.0
  tau: 100.0
  activation: tanh
  recurrent_noise_std: 0.05

training:
  steps: 4000
  learning_rate: 0.001
  log_every: 100
  yang_weighted_loss: true
  ignore_initial_steps: 5
  response_transition_steps: 5
  response_weight: 5.0
  fixation_weight: 2.0
  input_noise_std: 0.01
  gradient_clip_value: 1.0
  device: auto

evaluation:
  batches: 20

analysis:
  n_components: 2
  n_trials: 64

decoder:
  n_trials: 512
  train_fraction: 0.75
  ridge_alpha: 1.0

paths:
  output_dir: outputs/yang_fixation_circular_working_memory
  run_name: yang_fixation_circular_working_memory
